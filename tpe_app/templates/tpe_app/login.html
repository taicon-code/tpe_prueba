{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPE Sistema - Iniciar Sesión</title>
    <link rel="stylesheet" href="{% static 'tpe_app/css/login.css' %}">
</head>
<body>
<div class="page">

    <!-- LEFT: Themis - Diosa de la Justicia -->
    <div class="themis-col">
        <img class="themis-img"
             src="{% static 'tpe_app/images/themis_clean.png' %}"
             alt="Themis - Diosa de la Justicia">
    </div>

    <!-- CENTER: Login Card -->
    <div class="login-col">
        <div class="card">
            <!-- TITLE AREA: Dentro del card, al inicio -->
            <div class="title-area">
                <div class="main-title">SITHE</div>
                <div class="sub-title">Sistema THEMIS</div>
                <div class="description">Tribunal de Personal del Ejército</div>
            </div>

            <div class="card-header">

            <!-- Django Messages (errores, alertas) -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Login Form -->
            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="field-group">
                    <label for="id_username">Usuario</label>
                    <input type="text"
                           id="id_username"
                           name="username"
                           required
                           autofocus
                           autocomplete="username">
                </div>

                <div class="field-group">
                    <label for="id_password">Contraseña</label>
                    <input type="password"
                           id="id_password"
                           name="password"
                           required
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <!-- RIGHT: Escudo del Ejército de Bolivia -->
    <div class="shield-col">
        <img class="shield-img"
             src="{% static 'tpe_app/images/escudo.png' %}"
             alt="Escudo Ejército de Bolivia">
    </div>

    <!-- BOTTOM: Lema con efecto dorado -->
    <div class="motto-row">
        <div class="divider-line"></div>
        <span class="motto-text">Por una Justicia Justa y Oportuna</span>
        <div class="divider-line"></div>
    </div>

</div>
</body>
</html>
